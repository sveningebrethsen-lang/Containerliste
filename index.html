<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ContainerScan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<!-- 🧠 OCR (uten API) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
/* --- BEHOLDER ALT DITT DESIGN --- */
/* (kortet ned her for lesbarhet – bruk din eksisterende CSS) */
body { margin:0; background:#0d1117; color:#e6edf3; font-family:Barlow,sans-serif; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); justify-content:center; align-items:center; flex-direction:column; }
.modal-overlay.open { display:flex; }
.scanner-frame { width:280px; height:200px; background:#000; border:2px solid #f0a500; border-radius:16px; overflow:hidden; position:relative; }
.scanner-line { position:absolute; width:100%; height:2px; background:#f0a500; animation:scan 2s linear infinite; }
@keyframes scan { 0%{top:0} 100%{top:100%} }
</style>
</head>

<body>

<!-- SCANNER -->
<div class="modal-overlay" id="scannerModal">
  <div class="scanner-frame">
    <video id="scannerVideo" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;"></video>
    <div class="scanner-line"></div>
  </div>
  <p style="color:#8b949e;margin-top:10px;">Scanner container...</p>
  <button onclick="closeScanner()" style="margin-top:10px;padding:10px 20px;">Lukk</button>
</div>

<!-- INPUT -->
<main style="padding:20px;">
  <h2>ContainerScan</h2>

  <input id="containerInput" placeholder="Container nummer" style="padding:12px;width:100%;font-size:18px;margin-bottom:10px;">

  <button onclick="openScanner()" style="padding:14px;width:100%;background:#f0a500;border:none;font-weight:bold;">
    📷 SKANN CONTAINER
  </button>
</main>

<script>

let videoStream = null;

function openScanner() {
  document.getElementById('scannerModal').classList.add('open');

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment' }
  }).then(stream => {
    videoStream = stream;
    const video = document.getElementById('scannerVideo');
    video.srcObject = stream;

    setTimeout(() => {
      captureAndProcess(video);
    }, 2000);

  }).catch(() => {
    alert("Kamera ikke tilgjengelig");
  });
}

async function captureAndProcess(video) {

  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);

  const cropped = cropContainerArea(canvas);

  await runOCR(cropped);

  closeScanner();
}

function cropContainerArea(canvas) {
  const w = canvas.width;
  const h = canvas.height;

  const crop = document.createElement('canvas');
  const cw = w * 0.8;
  const ch = h * 0.35;

  crop.width = cw;
  crop.height = ch;

  const ctx = crop.getContext('2d');
  ctx.drawImage(canvas, w*0.1, h*0.2, cw, ch, 0, 0, cw, ch);

  return crop;
}

async function runOCR(imageCanvas) {

  const result = await Tesseract.recognize(
    imageCanvas,
    'eng',
    {
      tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'
    }
  );

  let text = result.data.text.toUpperCase().replace(/\s/g,'');

  const match = text.match(/[A-Z]{4}\d{6,7}/);

  if (match) {
    document.getElementById("containerInput").value = match[0];
    alert("Funnet: " + match[0]);
  } else {
    alert("Fant ikke container");
  }
}

function closeScanner() {
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
  }
  document.getElementById('scannerModal').classList.remove('open');
}

</script>

</body>
</html>
