<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ContainerScan v5</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
    --accent: #f0a500; --green: #2ea043; --green-light: #56d364; --blue: #1f6feb; --text: #e6edf3; --text-dim: #8b949e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
  
  header { 
    background: var(--surface); 
    border-bottom: 1px solid var(--border); 
    padding: 10px 16px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
  }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
  .logo span { color: var(--text); }
  
  .driver-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .driver-dot {
    width: 8px; height: 8px;
    background: var(--green-light);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green-light);
  }

  main { flex: 1; padding: 12px; max-width: 450px; margin: 0 auto; width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .section-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 4px; }
  
  input[type="text"], textarea { 
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; 
    padding: 12px; color: var(--text); font-size: 16px; width: 100%; 
  }
  input.mono { font-family: 'Space Mono', monospace; font-size: 20px; text-transform: uppercase; text-align: center; letter-spacing: 2px; }
  textarea { resize: none; min-height: 60px; font-family: 'Barlow', sans-serif; }
  
  .toggle-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tgl-btn { 
    background: var(--surface); border: 2px solid var(--border); border-radius: 8px; 
    padding: 12px; color: var(--text-dim); cursor: pointer; font-weight: 600; text-align: center; transition: 0.2s;
  }
  /* Aktive stiler */
  .tgl-btn.active-import { border-color: var(--accent); color: var(--accent); background: rgba(240,165,0,0.1); }
  .tgl-btn.active-eksport { border-color: #a371f7; color: #a371f7; background: rgba(163,113,247,0.1); }
  .tgl-btn.active-havn { border-color: var(--blue); color: #79c0ff; background: rgba(31,111,235,0.1); }
  .tgl-btn.active-kunde { border-color: var(--green); color: #56d364; background: rgba(46,160,67,0.1); }

  .checkbox-group { 
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; 
    padding: 12px; display: flex; align-items: center; gap: 10px; 
  }
  .submit-btn { 
    background: var(--green); color: white; border: none; border-radius: 10px; 
    padding: 16px; font-weight: 800; font-size: 18px; cursor: pointer; margin-top: 5px;
  }
  .counter-box { text-align: center; padding: 10px; border-top: 1px solid var(--border); margin-top: 10px; }
  .counter-number { font-family: 'Space Mono', monospace; font-size: 32px; color: var(--accent); }
  
  .toast { 
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); 
    background: var(--surface2); border: 1px solid var(--border); padding: 12px 20px; 
    border-radius: 10px; transition: 0.3s; z-index: 1000; 
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Container<span>Scan</span></div>
  <div class="driver-badge" id="badgeContainer" style="display:none;">
    <div class="driver-dot"></div>
    <span id="driverDisplay"></span>
  </div>
</header>

<main>
  <div id="setup-view" style="display:none; flex-direction:column; gap:15px;">
    <h2 style="text-align:center">Velkommen 👷</h2>
    <input type="text" id="nameInp" placeholder="Ditt navn">
    <input type="text" id="whInp" placeholder="Webhook URL">
    <button class="submit-btn" onclick="saveSetup()">START DAGEN →</button>
  </div>

  <div id="main-view" style="display:none; flex-direction:column; gap:12px;">
    <div class="input-group">
      <div class="section-label">Containernummer</div>
      <input type="text" class="mono" id="contInp" maxlength="11" placeholder="ABCD1234567">
    </div>

    <div class="input-group">
      <div class="section-label">Type</div>
      <div class="toggle-group">
        <button class="tgl-btn" id="btnImport" onclick="setType('Import')">IMPORT</button>
        <button class="tgl-btn" id="btnEksport" onclick="setType('Eksport')">EKSPORT</button>
      </div>
    </div>

    <div class="input-group">
      <div class="section-label">Fra/til</div>
      <div class="toggle-group">
        <button class="tgl-btn" id="btnHavn" onclick="setStatus('Havn')">⚓ Havn</button>
        <button class="tgl-btn" id="btnKunde" onclick="setStatus('Kunde')">🏠 Mottaker</button>
      </div>
    </div>

    <div class="input-group">
      <div class="section-label">Kunde</div>
      <input type="text" id="custInp" placeholder="Firmanavn">
    </div>

    <div class="input-group">
      <div class="section-label">Kommentar</div>
      <textarea id="commInp" placeholder="Valgfri kommentar..."></textarea>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="roundInp" style="width:20px; height:20px;">
      <label for="roundInp">Rundtur (Auto-retur)</label>
    </div>

    <button class="submit-btn" onclick="handleRegister()">➕ REGISTRER</button>

    <div class="counter-box">
      <div class="section-label">Registrert i dag</div>
      <div class="counter-number" id="dayCount">0</div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let selType = '';
let selStatus = '';
let driver = localStorage.getItem('cs_name') || '';
let webhook = localStorage.getItem('cs_wh') || '';

window.onload = () => {
  if(!driver) {
    document.getElementById('setup-view').style.display='flex';
  } else {
    document.getElementById('main-view').style.display='flex';
    document.getElementById('badgeContainer').style.display='flex';
    document.getElementById('driverDisplay').innerText = driver;
    updateCounter();
  }
  checkNewDay();
};

function saveSetup() {
  const n = document.getElementById('nameInp').value.trim();
  const w = document.getElementById('whInp').value.trim();
  if(!n || !w) return alert("Fyll ut navn og URL");
  localStorage.setItem('cs_name', n);
  localStorage.setItem('cs_wh', w);
  location.reload();
}

function setType(v) {
  selType = v;
  document.getElementById('btnImport').className = 'tgl-btn' + (v==='Import'?' active-import':'');
  document.getElementById('btnEksport').className = 'tgl-btn' + (v==='Eksport'?' active-eksport':'');
}

function setStatus(v) {
  selStatus = v;
  document.getElementById('btnHavn').className = 'tgl-btn' + (v==='Havn'?' active-havn':'');
  document.getElementById('btnKunde').className = 'tgl-btn' + (v==='Kunde'?' active-kunde':'');
}

function getDirection(t, s) {
  return s === 'Havn' ? 'Havn -> Kunde' : 'Kunde -> Havn';
}

async function handleRegister() {
  const contInp = document.getElementById('contInp');
  const custInp = document.getElementById('custInp');
  const commInp = document.getElementById('commInp');
  const roundInp = document.getElementById('roundInp');
  
  const cont = contInp.value.toUpperCase().replace(/\s/g,'');
  const cust = custInp.value.trim();
  const comm = commInp.value.trim();
  const isRound = roundInp.checked;
  const regex = /^[A-Z]{4}\d{7}$/;

  if(!regex.test(cont)) return showToast("❌ Format: 4 bokstaver + 7 tall", "red");
  if(!selType || !selStatus || !cust) return showToast("⚠️ Velg type, status og kunde", "");

  const dir = getDirection(selType, selStatus);
  const now = new Date();
  
  const payload = {
    date: now.toLocaleDateString('no-NO'),
    time: now.toLocaleTimeString('no-NO', {hour:'2-digit', minute:'2-digit'}),
    driver: driver,
    cont: cont,
    type: selType,
    status: dir,
    cust: cust,
    comm: comm
  };

  showToast("📡 Sender...", "");
  await send(payload);
  let count = 1;

  if(isRound) {
    const reverseDir = dir === 'Havn -> Kunde' ? 'Kunde -> Havn' : 'Havn -> Kunde';
    const payload2 = { ...payload, status: reverseDir, comm: comm + " (Rundtur retur)" };
    await send(payload2);
    count = 2;
  }

  addCounter(count);
  showToast("✅ Registrert!", "var(--green-light)");
  
  // --- RESET AV SKJEMA ---
  contInp.value = '';
  custInp.value = '';
  commInp.value = '';
  roundInp.checked = false;
  
  // Nullstill knappe-valg (fjerner farger)
  selType = '';
  selStatus = '';
  document.getElementById('btnImport').className = 'tgl-btn';
  document.getElementById('btnEksport').className = 'tgl-btn';
  document.getElementById('btnHavn').className = 'tgl-btn';
  document.getElementById('btnKunde').className = 'tgl-btn';
}

async function send(obj) {
  try {
    await fetch(webhook, { method: 'POST', mode: 'no-cors', body: JSON.stringify(obj) });
  } catch(e) { console.error(e); }
}

function addCounter(n) {
  let c = parseInt(localStorage.getItem('cs_count') || '0');
  localStorage.setItem('cs_count', c + n);
  updateCounter();
}

function updateCounter() {
  document.getElementById('dayCount').innerText = localStorage.getItem('cs_count') || '0';
}

function checkNewDay() {
  const d = new Date().toLocaleDateString();
  if(localStorage.getItem('cs_date') !== d) {
    localStorage.setItem('cs_date', d);
    localStorage.setItem('cs_count', '0');
    updateCounter();
  }
}

function showToast(m, c) {
  const t = document.getElementById('toast');
  t.innerText = m; t.style.color = c || 'white'; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
